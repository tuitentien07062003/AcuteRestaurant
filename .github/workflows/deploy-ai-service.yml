name: CI/CD Docker for AI Service

on:
  push:
    branches: [ "main" ]
    paths:
      - 'ai_service/**'
      - '.github/workflows/**'

jobs:
  docker-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-service-image ./ai_service

      - name: Run container
        run: |
          docker run -d -p 8000:8000 --name test-container ai-service-image
          echo "Đang đợi AI load model vào RAM..."
          sleep 20 

      - name: Health check
        run: |
          curl -f http://localhost:8000/health

      - name: Stop container
        run: docker rm -f test-container

      - name: Trigger Render Deploy
        if: success()
        run: curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL_AI_SERVICE }}"